          - name: title
            label: Project Title
            type: string
            required: true
          - name: summary
            label: Project Summary
            type: text
            required: true
          - name: date
            label: Date
            type: date
            required: true
          - name: tags
            label: Tags
            type: string
            list: true
          - name: cover
            label: Cover Image URL
            type: string
          - name: video
            label: Demo Video URL
