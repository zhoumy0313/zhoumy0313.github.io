                    - paper
                    - demo
                    - video
                    - external
          - name: featured
            label: Featured on Homepage
            type: boolean
          - name: order
            label: Sort Order
            type: number
          - name: body
            label: Project Detail Body
            type: rich-text
            options:
              media: site-media
              path: public/images/uploads
              rename: true
              switcher: true
