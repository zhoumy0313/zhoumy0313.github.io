              - name: image
                label: Image URL
                type: string
              - name: url
                label: External URL
                type: string
                required: true
              - name: tags
                label: Tags
                type: string
                list: true
          - name: body
            label: Page Body Note
            type: rich-text
            options:
              media: site-media
              path: public/images/uploads
              rename: true
              switcher: true

      - name: en-social
        label: Social Links
        type: file
        path: content/site/en/social.md
        format: yaml-frontmatter
        fields:
          - name: items
            label: Social Links
            type: object
            list:
              collapsible:
                collapsed: true
                summary: "{label}"
            fields:
              - name: label
                label: Label
                type: string
                required: true
              - name: url
